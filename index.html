<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: white;
    font-family: Arial, sans-serif;
}

/* Button */
button {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 35px 70px; /* বড় করা হয়েছে */
    font-size: 32px; /* বড় লেখা */
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
}

/* Love text */
.love {
    position: absolute;
    font-size: 64px; /* বড় করা */
    font-weight: 900; /* মোটা করা */
    color: #ff004c;
    text-shadow: 4px 4px 12px rgba(0,0,0,0.3);
    animation: fall linear forwards;
}

/* 3D falling animation */
@keyframes fall {
    0% {
        transform: translateY(-150px) rotateX(80deg) scale(0.8);
        opacity: 0;
    }
    40% {
        transform: translateY(40vh) rotateX(0deg) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotateX(0deg) scale(1);
        opacity: 1;
    }
}
</style>

</head>

<body>

<button onclick="startLove()">এইযে মেডাম এই খানে চাপ দেন</button>

<script>
function createLove() {
    let total = 10;
    let gap = window.innerWidth / total;

    for (let i = 0; i < total; i++) {
        let el = document.createElement("div");
        el.className = "love";
        el.innerText = "I Love You 😘"; // emoji add

        el.style.left = (i * gap + 20) + "px";
        el.style.animationDuration = (6 + Math.random() * 2) + "s";

        document.body.appendChild(el);

        // animation শেষে remove করে আবার নতুন আসবে
        setTimeout(() => {
            el.remove();
        }, 8000);
    }
}

function startLove() {
    document.querySelector("button").style.display = "none";

    // বার বার create হবে (infinite effect)
    setInterval(createLove, 2000);
}
</script>

</body>
</html>
